<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6D Orbit — 3-Torus Projection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #05070f;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .overlay {
    position: absolute;
    top: 64px;
    left: 24px;
    padding: 14px 18px;
    background: linear-gradient(180deg, rgba(12,16,28,0.85), rgba(8,10,18,0.75));
    border: 1px solid rgba(140,170,255,0.18);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 14px;
    color: #d6e2ff;
    font-size: 13px;
    line-height: 1.6;
    letter-spacing: 0.2px;
    pointer-events: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    max-width: 320px;
  }
  .overlay b {
    color: #ffffff;
    font-weight: 500;
  }
  .overlay .title {
    font-weight: 500;
    font-size: 14px;
    margin-bottom: 6px;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .overlay .hint {
    opacity: 0.85;
  }
  .overlay .row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .key {
    padding: 2px 6px;
    background: rgba(140,170,255,0.12);
    border: 1px solid rgba(140,170,255,0.25);
    border-radius: 6px;
    font-size: 11px;
    color: #b8c9ff;
  }
  .idwt-link {
    position: absolute;
    top: 24px;
    left: 24px;
    z-index: 100;
    color: #d6e2ff;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    padding: 6px 10px;
    background: rgba(12,16,28,0.7);
    border: 1px solid rgba(140,170,255,0.18);
    border-radius: 8px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
  }
  .idwt-link:hover {
    color: #ffffff;
    background: rgba(20,26,48,0.85);
    border-color: rgba(140,170,255,0.35);
  }
  @media (max-width: 600px) {
    .overlay { top: 56px; left: 12px; right: 12px; font-size: 12px; padding: 12px 14px; }
    .idwt-link { top: 12px; left: 12px; }
  }
</style>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<a href="/" class="idwt-link">IDWT</a>
<div class="overlay">
  <div class="title">6D Orbit → 3D Projection</div>
  <div class="hint"><b>Drag</b> to rotate 6D slice</div>
  <div class="row">
    <span class="key">Shift + Drag</span>
    <span>3rd plane</span>
  </div>
  <div class="row">
    <span class="key">Wheel</span>
    <span>zoom</span>
    <span class="key">Right-drag</span>
    <span>pan</span>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070f);
scene.fog = new THREE.FogExp2(0x05070f, 0.025);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
const cameraTarget = new THREE.Vector3(0, 0, 0);
let cameraDistance = 5.8;
camera.position.set(0, 0, cameraDistance);
camera.lookAt(cameraTarget);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Postprocessing
const renderPass = new RenderPass(scene, camera);
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.85, 0.12);
const composer = new EffectComposer(renderer);
composer.addPass(renderPass);
composer.addPass(bloomPass);

// Lights
scene.add(new THREE.AmbientLight(0x6a7bb8, 0.4));
const p1 = new THREE.PointLight(0x7fa0ff, 2.5, 30);
p1.position.set(5, 4, 5);
scene.add(p1);
const p2 = new THREE.PointLight(0xff7ab8, 1.8, 30);
p2.position.set(-6, -3, 2);
scene.add(p2);

// Stars background
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const r = 25 + Math.random() * 25;
  const th = Math.random() * Math.PI * 2;
  const ph = Math.acos(2 * Math.random() - 1);
  starPos[i*3] = r * Math.sin(ph) * Math.cos(th);
  starPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
  starPos[i*3+2] = r * Math.cos(ph);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0x9bb4ff,
  size: 0.04,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false
}));
scene.add(stars);

// 6D orbit data
const N = 8000;
const points6D = new Float32Array(N * 6);
for (let i = 0; i < N; i++) {
  const t = (i / (N - 1)) * Math.PI * 2 * 12;
  const i6 = i * 6;
  points6D[i6] = Math.cos(1.0 * t);
  points6D[i6 + 1] = Math.sin(1.0 * t);
  points6D[i6 + 2] = Math.cos(1.7 * t);
  points6D[i6 + 3] = Math.sin(1.7 * t);
  points6D[i6 + 4] = Math.cos(2.3 * t);
  points6D[i6 + 5] = Math.sin(2.3 * t);
}

// 6x6 rotation matrix R
const R = [];
for (let i = 0; i < 6; i++) {
  R[i] = new Float32Array(6);
  R[i][i] = 1;
}
function rotatePlane(i, j, theta) {
  const c = Math.cos(theta);
  const s = Math.sin(theta);
  const ri = R[i];
  const rj = R[j];
  for (let col = 0; col < 6; col++) {
    const a = ri[col];
    const b = rj[col];
    ri[col] = c * a - s * b;
    rj[col] = s * a + c * b;
  }
}

// Line geometry
const positions = new Float32Array(N * 3);
const colors = new Float32Array(N * 3);
const color = new THREE.Color();
for (let i = 0; i < N; i++) {
  const h = (i / (N - 1) * 0.85 + 0.55) % 1;
  color.setHSL(h, 1, 0.5);
  colors[i*3] = color.r;
  colors[i*3+1] = color.g;
  colors[i*3+2] = color.b;
}
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
lineGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const lineMat = new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent: true,
  opacity: 0.92,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const orbitLine = new THREE.Line(lineGeo, lineMat);
scene.add(orbitLine);

// Glow tube for extra bloom
const tubeMat = new THREE.LineBasicMaterial({
  color: 0xaac8ff,
  transparent: true,
  opacity: 0.1,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const orbitGlow = new THREE.Line(lineGeo.clone(), tubeMat);
scene.add(orbitGlow);

// Emphasis spheres every 100
const sphereCount = Math.floor(N / 1000);
const sphereGeo = new THREE.SphereGeometry(0.1, 12, 12);
const sphereMat = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const spheres = [];
for (let i = 0; i < sphereCount; i++) {
  const m = new THREE.Mesh(sphereGeo, sphereMat.clone());
  m.material.color.copy(color.setHSL((i/sphereCount*0.85+0.55)%1, 0.8, 0.7));
  scene.add(m);
  spheres.push(m);
}

// Initial projection
function projectPoints() {
  const r0 = R[0], r1 = R[1], r2 = R[2];
  for (let i = 0; i < N; i++) {
    const i6 = i * 6;
    const p0 = points6D[i6], p1 = points6D[i6+1], p2 = points6D[i6+2];
    const p3 = points6D[i6+3], p4 = points6D[i6+4], p5 = points6D[i6+5];
    const x = r0[0]*p0 + r0[1]*p1 + r0[2]*p2 + r0[3]*p3 + r0[4]*p4 + r0[5]*p5;
    const y = r1[0]*p0 + r1[1]*p1 + r1[2]*p2 + r1[3]*p3 + r1[4]*p4 + r1[5]*p5;
    const z = r2[0]*p0 + r2[1]*p1 + r2[2]*p2 + r2[3]*p3 + r2[4]*p4 + r2[5]*p5;
    const i3 = i * 3;
    positions[i3] = x;
    positions[i3+1] = y;
    positions[i3+2] = z;
  }
  lineGeo.attributes.position.needsUpdate = true;
  lineGeo.computeBoundingSphere();
  orbitGlow.geometry.attributes.position.copy(lineGeo.attributes.position);
  orbitGlow.geometry.attributes.position.needsUpdate = true;

  for (let s = 0; s < sphereCount; s++) {
    // make spheres travel along the orbit
    const speed = 0.05; // orbits per second, tweak this
    const base = s * 100;
    const offset = Math.floor((performance.now() * 0.001 * speed * N) + s * 137) % N;
    const idx = ((base + offset) % N) * 3;
    spheres[s].position.set(positions[idx], positions[idx+1], positions[idx+2]);
    const scale = 0.8 + 0.3 * Math.sin(performance.now()*0.001 + s*0.2);
    spheres[s].scale.setScalar(scale);
  }
}
projectPoints();

// Interaction
let isRotating = false;
let isPanning = false;
let lastX = 0, lastY = 0;

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button === 0) {
    isRotating = true;
  } else if (e.button === 2) {
    isPanning = true;
  }
  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener('pointermove', e => {
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  if (isRotating) {
    if (e.shiftKey) {
      rotatePlane(2, 5, dx * 0.005);
    } else {
      rotatePlane(0, 3, dx * 0.005);
      rotatePlane(1, 4, dy * 0.005);
    }
  }
  if (isPanning) {
    cameraTarget.x -= dx * 0.002 * cameraDistance;
    cameraTarget.y += dy * 0.002 * cameraDistance;
  }
  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener('pointerup', () => {
  isRotating = false;
  isPanning = false;
});

renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  cameraDistance *= 1 + e.deltaY * 0.001;
  cameraDistance = Math.max(2.0, Math.min(12, cameraDistance));
}, { passive: false });

// Touch support
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    isRotating = true;
  }
});
renderer.domElement.addEventListener('touchmove', e => {
  if (isRotating && e.touches.length === 1) {
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    rotatePlane(0, 3, dx * 0.005);
    rotatePlane(1, 4, dy * 0.005);
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
}, { passive: true });
window.addEventListener('touchend', () => isRotating = false);

// Animate
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Auto-rotate 6D
  rotatePlane(0, 3, 0.0050);
  rotatePlane(1, 4, -0.00220);
  rotatePlane(2, 5, 0.00130);

  projectPoints();

  // Camera update
  camera.position.set(cameraTarget.x, cameraTarget.y, cameraTarget.z + cameraDistance);
  camera.lookAt(cameraTarget);

  // Subtle scene motion
  stars.rotation.y += 0.00008;
  stars.rotation.x = Math.sin(time * 0.05) * 0.05;
  p1.position.x = 5 * Math.cos(time * 0.2);
  p1.position.z = 5 * Math.sin(time * 0.2);
  p2.position.x = -5 * Math.cos(time * 0.15);
  p2.position.y = 3 * Math.sin(time * 0.18);

  composer.render();
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
